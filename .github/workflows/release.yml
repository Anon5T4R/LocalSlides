name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            bundles: appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            curl wget file

      - name: Install JS deps
        run: npm ci

      - name: Baixar runtime de IA (llama.cpp) — Windows
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/fetch-llama.ps1

      - name: Baixar runtime de IA (llama.cpp) — Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: bash scripts/fetch-llama.sh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LocalSlides ${{ github.ref_name }}"
          releaseBody: |
            ## LocalSlides ${{ github.ref_name }}

            Apresentações 100% offline, com canvas posicional, export PDF/PNG/PPTX e IA local (llama.cpp / GGUF).

            ### Downloads
            - **Windows — Instalador:** `*-setup.exe` (instala no sistema)
            - **Linux — AppImage:** `*.AppImage` (dê permissão de execução e rode)

            > **IA:** aponte para uma pasta com modelos `.gguf`, clique **✦ IA**, escaneie e inicie. Modelos GGUF não inclusos.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --bundles ${{ matrix.bundles }}
