<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#0b2a6b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Document with folded corner -->
  <g filter="url(#shadow)">
    <path d="M252 168
             h420
             l100 100
             v588
             a16 16 0 0 1 -16 16
             h-504
             a16 16 0 0 1 -16 -16
             v-672
             a16 16 0 0 1 16 -16 z"
          fill="url(#paper)"/>
    <!-- folded corner -->
    <path d="M672 168 l100 100 h-84 a16 16 0 0 1 -16 -16 z" fill="#c7d2e3"/>
  </g>

  <!-- Generic writing lines -->
  <g fill="#cbd5e1">
    <rect x="316" y="318" width="392" height="26" rx="13"/>
    <rect x="316" y="386" width="360" height="26" rx="13"/>
    <rect x="316" y="454" width="392" height="26" rx="13"/>
  </g>

  <!-- Easter egg: "Taylor" sitting among the lines -->
  <text x="320" y="586"
        font-family="'Segoe Script','Brush Script MT','Comic Sans MS',cursive"
        font-size="92" font-style="italic" font-weight="700"
        fill="#2563eb">Taylor</text>

  <!-- more writing lines below -->
  <g fill="#cbd5e1">
    <rect x="316" y="640" width="392" height="26" rx="13"/>
    <rect x="316" y="708" width="300" height="26" rx="13"/>
  </g>
</svg>
